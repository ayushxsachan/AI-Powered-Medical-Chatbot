services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medai}
      POSTGRES_USER: ${POSTGRES_USER:-medai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medai} -d ${POSTGRES_DB:-medai}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://medai:medai@postgres:5432/medai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-long-random-production-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:8501,http://frontend:8501}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      VECTOR_SIZE: ${VECTOR_SIZE:-384}
      INITIALIZE_KNOWLEDGE_ON_STARTUP: ${INITIALIZE_KNOWLEDGE_ON_STARTUP:-true}
      DATA_DIR: /app/data
      STORAGE_DIR: /app/storage
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://medai:medai@postgres:5432/medai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-long-random-production-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      VECTOR_SIZE: ${VECTOR_SIZE:-384}
      DATA_DIR: /app/data
      STORAGE_DIR: /app/storage
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO --concurrency=2
    volumes:
      - ./data:/app/data
      - backend_storage:/app/storage
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://medai:medai@postgres:5432/medai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-to-a-long-random-production-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4.1-mini}
      VECTOR_SIZE: ${VECTOR_SIZE:-384}
      DATA_DIR: /app/data
      STORAGE_DIR: /app/storage
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    volumes:
      - ./data:/app/data
      - backend_storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    environment:
      API_URL: ${API_URL:-http://backend:8000}
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  backend_storage:
